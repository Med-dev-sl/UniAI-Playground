workflows:
  android-debug-workflow:
    name: UNI AI Android Debug APK
    environment:
      node: latest
      java: 21
      groups:
        - supabase_keys
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-workflow:
    name: UNI AI iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
      groups:
        - supabase_keys
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS App
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
