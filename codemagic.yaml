workflows:
  android-debug-workflow:
    name: UNI AI Android Debug APK
    environment:
      node: latest
      java: 21
      groups:
        - supabase_keys
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-workflow:
    name: UNI AI iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
      groups:
        - supabase_keys
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS App (Compilation Check)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - /tmp/xcodebuild_logs/*.log

  windows-workflow:
    name: UNI AI Windows Desktop Build
    instance_type: windows_x2
    max_build_duration: 60
    environment:
      node: latest
      groups:
        - supabase_keys
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Windows App
        script: |
          npm run electron:build
    artifacts:
      - dist-electron/*.exe
